name: Ask AI (ES)
on:
  workflow_dispatch:

permissions:
  models: read

jobs:
  ask-ai-es:
    runs-on: ubuntu-latest

    steps:
      - name: AI Inference
        id: ai-response
        uses: actions/ai-inference@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Dame un chiste de programación.

      - name: Display AI Response
        run: |
          echo "## 🤖 Respuesta AI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.ai-response.outputs.response }}" >> $GITHUB_STEP_SUMMARY
